name: Refresh intelligence data

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: intelligence-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      models: read
    env:
      DATA_CONTACT_EMAIL: ${{ vars.DATA_CONTACT_EMAIL }}
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      GITHUB_TOKEN: ${{ github.token }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_BASE_URL: ${{ vars.AI_BASE_URL }}
      AI_MODEL: ${{ vars.AI_MODEL }}
      AI_MAX_COMPANIES: ${{ vars.AI_MAX_COMPANIES || '8' }}
      NEWS_AI_MAX_ARTICLES: ${{ vars.NEWS_AI_MAX_ARTICLES || '8' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Fetch and normalize official data
        run: npm run data:update
      - name: Generate evidence-grounded AI analysis
        run: npm run analysis:update
      - name: Fetch and synthesize authoritative intelligence
        run: npm run news:update
      - name: Validate generated snapshots
        run: |
          npm run data:validate
          npm run analysis:validate
          npm run news:validate
      - name: Verify site
        run: |
          npm run check
          npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - name: Commit refreshed snapshot
        run: |
          if git diff --quiet -- src/data/generated/company-updates.json src/data/generated/company-analysis.json src/data/generated/news.json; then
            echo "No generated data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/generated/company-updates.json src/data/generated/company-analysis.json src/data/generated/news.json
          git commit -m "chore(data): refresh intelligence snapshots"
          git push

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - name: Deploy refreshed site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
