name: Refresh official company data

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: company-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      DATA_CONTACT_EMAIL: ${{ vars.DATA_CONTACT_EMAIL }}
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Fetch and normalize official data
        run: npm run data:update
      - name: Validate generated snapshot
        run: npm run data:validate
      - name: Verify site
        run: |
          npm run check
          npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - name: Commit refreshed snapshot
        run: |
          if git diff --quiet -- src/data/generated/company-updates.json; then
            echo "No generated data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/generated/company-updates.json
          git commit -m "chore(data): refresh official company data"
          git push

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - name: Deploy refreshed site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
